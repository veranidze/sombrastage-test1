<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sombra Stage | Leader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=JetBrains+Mono&display=swap');

        :root {
            --bg-color: #0c0e14;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent-color: #10b981;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.08);
            --played-bg: rgba(16, 185, 129, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        .song-row {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 1px solid var(--glass-border);
        }

        .song-row:active {
            background: rgba(255, 255, 255, 0.06);
        }

        .song-row.played {
            background: var(--played-bg);
        }

        .song-row.active {
            border-left: 4px solid var(--accent-color);
            background: rgba(16, 185, 129, 0.05);
        }

        .lyrics-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
        }

        .lyrics-panel.show {
            max-height: 1000px;
        }

        @keyframes pulse-once {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .animate-pulse-once {
            animation: pulse-once 0.4s ease-out;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        pre {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Стиль для перетаскиваемого элемента */
        .sortable-ghost {
            opacity: 0.3;
            background: var(--accent-color) !important;
        }
    </style>
    <script type="module">
        const SUPABASE_URL = 'https://llzpyhmhdbckkiovjiig.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxsenB5aG1oZGJja2tpb3ZqaWlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4Mjc0ODgsImV4cCI6MjA4NjQwMzQ4OH0.NoXKtNS3QtFyv-JLF_bRx_xusBRGWX_EukBgT3Cz4To';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const TG_BOT_TOKEN = "8589462243:AAFKM4TYkNQzGddVbdE7esNUkvwWfsO-SGQ";
        const TG_CHAT_ID = "-4995669410";

        let songs = [];
        let activeSongId = null;
        let playedIds = JSON.parse(localStorage.getItem('played_songs') || '[]');
        let isSending = false;

        const songListContainer = document.getElementById('song-list');
        const loader = document.getElementById('global-loader');
        const songModal = document.getElementById('song-modal');
        const songForm = document.getElementById('song-form');

        function initSortable() {
            const el = document.getElementById('song-list');
            if (window.songSortable) window.songSortable.destroy();
            window.songSortable = Sortable.create(el, {
                animation: 250,
                delay: 0,
                handle: '.drag-handle',
                ghostClass: 'sortable-ghost',
                onEnd: async (evt) => {
                    const rows = Array.from(el.children);
                    const updates = rows.map((child, index) => {
                        const newOrder = index + 1;
                        // Обновляем текст номера в интерфейсе сразу
                        const orderLabel = child.querySelector('.order-label');
                        if (orderLabel) orderLabel.innerText = String(newOrder).padStart(2, '0');
                        return { id: child.dataset.id, order: newOrder };
                    });

                    if (loader) loader.classList.remove('opacity-0');
                    try {
                        const { error } = await supabaseClient.from('songs').upsert(updates);
                        if (error) throw error;
                        showToast("Порядок сохранен");
                    } catch (err) {
                        console.error(err);
                        showToast("Ошибка сохранения");
                        refreshData();
                    } finally {
                        if (loader) loader.classList.add('opacity-0');
                    }
                }
            });
        }

        async function refreshData() {
            if (loader) loader.classList.remove('opacity-0');
            try {
                const { data: songsData, error: songsError } = await supabaseClient
                    .from('songs')
                    .select('*')
                    .order('order', { ascending: true });

                if (songsError) throw songsError;

                const { data: statusData, error: statusError } = await supabaseClient
                    .from('status')
                    .select('active_song_id')
                    .eq('id', 1)
                    .maybeSingle();

                if (statusError) throw statusError;

                songs = songsData || [];
                activeSongId = statusData?.active_song_id || null;
                renderSongs();
                initSortable();
            } catch (err) {
                console.error('Data error:', err);
                showToast("Ошибка данных");
            } finally {
                if (loader) loader.classList.add('opacity-0');
            }
        }

        supabaseClient
            .channel('any')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'songs' }, (payload) => {
                // Чтобы избежать мерцания при перетаскивании самим пользователем, можно добавить проверку,
                // но для надежности в многопользовательской среде оставляем обновление.
                refreshData();
            })
            .subscribe();

        window.announceSong = async (id) => {
            if (isSending) return;
            const song = songs.find(s => s.id === id);
            if (!song) return;
            isSending = true;

            try {
                activeSongId = id;
                if (!playedIds.includes(id)) {
                    playedIds.push(id);
                    localStorage.setItem('played_songs', JSON.stringify(playedIds));
                }
                renderSongs();

                await supabaseClient.from('status').upsert({ id: 1, active_song_id: id, updated_at: new Date() });

                const message = `📡 <b>СЛЕДУЮЩАЯ ПЕСНЯ:</b>\n🎵 <b>${song.title.toUpperCase()}</b>`;
                await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TG_CHAT_ID, text: message, parse_mode: 'HTML' })
                });

                showToast(`ТГ: ${song.title}`);
            } catch (err) {
                console.error(err);
                showToast("Ошибка связи");
            } finally {
                isSending = false;
            }
        };

        window.resetPlayed = () => {
            if (confirm('Сбросить счетчик сыгранных песен?')) {
                playedIds = [];
                localStorage.setItem('played_songs', '[]');
                renderSongs();
                showToast("Счетчик сброшен");
            }
        };

        window.toggleLyrics = (id) => {
            const el = document.getElementById(`lyrics-${id}`);
            if (el) el.classList.toggle('show');
        };

        window.openEditModal = (id = null) => {
            const song = id ? songs.find(s => s.id === id) : { title: '', lyrics: '', order: (songs.length > 0 ? Math.max(...songs.map(s => s.order)) + 1 : 1) };
            document.getElementById('modal-title').innerText = id ? 'Редактировать' : 'Новая песня';
            document.getElementById('song-id').value = id || '';
            document.getElementById('input-title').value = song.title;
            document.getElementById('input-lyrics').value = song.lyrics || '';
            document.getElementById('input-order').value = song.order;
            document.getElementById('delete-btn').classList.toggle('hidden', !id);
            songModal.classList.remove('hidden');
            songModal.classList.add('flex');
        };

        window.closeModal = () => {
            songModal.classList.add('hidden');
            songModal.classList.remove('flex');
        };

        window.deleteCurrentSong = async () => {
            const id = document.getElementById('song-id').value;
            if (id && confirm('Удалить песню?')) {
                const { error } = await supabaseClient.from('songs').delete().eq('id', id);
                if (!error) {
                    closeModal();
                    await refreshData();
                }
            }
        };

        songForm.onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('song-id').value;
            const songData = {
                title: document.getElementById('input-title').value,
                lyrics: document.getElementById('input-lyrics').value,
                order: Number(document.getElementById('input-order').value)
            };

            const action = id ?
                supabaseClient.from('songs').update(songData).eq('id', id) :
                supabaseClient.from('songs').insert([songData]);

            const { error } = await action;

            if (!error) {
                closeModal();
                await refreshData();
            }
        };

        function showToast(text) {
            const toast = document.getElementById('status-toast');
            const toastText = document.getElementById('toast-text');
            toastText.innerText = text;
            toast.classList.remove('translate-y-24', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-24', 'opacity-0'), 3000);
        }

        function renderSongs() {
            if (songs.length === 0) {
                songListContainer.innerHTML = `<div class="p-12 text-center opacity-40 uppercase font-black text-xs tracking-widest">Плейлист пуст</div>`;
                return;
            }

            songListContainer.innerHTML = songs.map(song => {
                const isActive = activeSongId === song.id;
                const isPlayed = playedIds.includes(song.id);
                return `
                <div class="song-row ${isActive ? 'active' : ''} ${isPlayed ? 'played' : ''} group" data-id="${song.id}">
                    <div class="flex items-center px-3 py-1 gap-1">
                        <!-- Иконка гамбургера для перетаскивания -->
                        <div class="drag-handle p-2 opacity-30 group-hover:opacity-100 transition-opacity cursor-grab active:cursor-grabbing text-slate-400">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="9" x2="20" y2="9"></line><line x1="4" y1="15" x2="20" y2="15"></line></svg>
                        </div>
                        
                        <div class="order-label w-5 text-[9px] font-black opacity-40">
                            ${String(song.order || 0).padStart(2, '0')}
                        </div>
                        
                        <div class="flex-1 cursor-pointer py-2" onclick="toggleLyrics('${song.id}')">
                            <h2 class="text-[13px] font-semibold tracking-tight ${isPlayed ? 'opacity-40 line-through' : ''} ${isActive ? 'text-emerald-400' : ''}">
                                ${song.title}
                            </h2>
                        </div>
                        
                        <div class="flex items-center gap-1">
                            <button onclick="openEditModal('${song.id}')" class="p-2 opacity-0 group-hover:opacity-100 transition-opacity text-slate-500 hover:text-white">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                            </button>
                            <button onclick="announceSong('${song.id}')" class="p-2 rounded-xl ${isActive ? 'bg-emerald-600' : 'bg-white/5'} hover:bg-emerald-500 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="${isActive ? 'white' : 'currentColor'}" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </button>
                        </div>
                    </div>
                    <div id="lyrics-${song.id}" class="lyrics-panel bg-black/20">
                        <div class="p-4 border-t border-white/5">
                            <pre class="text-[12px] leading-relaxed text-slate-400 select-all whitespace-pre-wrap">${song.lyrics || 'Нет текста'}</pre>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        window.onload = refreshData;
    </script>
</head>

<body class="antialiased">
    <!-- Progress Loader -->
    <div id="global-loader"
        class="fixed top-0 left-0 w-full h-[2px] z-50 overflow-hidden bg-white/5 transition-opacity duration-300 opacity-0">
        <div class="w-full h-full bg-emerald-500 origin-left animate-[loading_1.5s_infinite_linear]"></div>
    </div>
    <style>
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>

    <header class="glass sticky top-0 z-40 px-5 py-3 mb-1">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-emerald-600/20 p-2 rounded-lg text-emerald-500 border border-emerald-500/30">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 18V5l12-2v13"></path>
                        <circle cx="6" cy="18" r="3"></circle>
                        <circle cx="18" cy="16" r="3"></circle>
                    </svg>
                </div>
                <h1
                    class="font-black text-xl tracking-tighter uppercase italic bg-gradient-to-r from-white to-slate-500 bg-clip-text text-transparent">
                    BandFlow</h1>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="resetPlayed()"
                    class="px-4 py-2 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-colors text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-white">
                    Reset
                </button>
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_10px_#10b981]"></div>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto pb-32">
        <div id="song-list" class="flex flex-col">
            <!-- Skeleton Loader -->
            <div class="p-10 text-center opacity-20 uppercase font-black text-[10px] tracking-[0.2em] animate-pulse">
                Initializing...</div>
        </div>
    </main>

    <!-- Global Actions -->
    <div class="fixed bottom-6 left-0 right-0 z-40 px-6 pointer-events-none">
        <div class="max-w-xl mx-auto flex justify-end pointer-events-auto">
            <button onclick="openEditModal()"
                class="w-16 h-16 bg-emerald-600 text-white rounded-2xl shadow-[0_0_30px_rgba(16,185,129,0.3)] flex items-center justify-center hover:scale-110 active:scale-95 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" stroke="currentColor"
                    stroke-width="3" viewBox="0 0 24 24">
                    <path d="M12 5v14M5 12h14" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="status-toast"
        class="fixed bottom-24 left-0 right-0 z-50 px-6 transition-all duration-300 translate-y-24 opacity-0 pointer-events-none">
        <div class="max-w-xs mx-auto glass border-emerald-500/50 p-4 rounded-2xl flex items-center gap-3 shadow-2xl">
            <div class="w-2 h-2 bg-emerald-500 rounded-full"></div>
            <span id="toast-text" class="font-bold text-xs uppercase tracking-wide"></span>
        </div>
    </div>

    <!-- Song Modal -->
    <div id="song-modal"
        class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] hidden items-end sm:items-center justify-center p-4">
        <div
            class="bg-[#161922] w-full max-w-lg rounded-[32px] border border-white/10 shadow-2xl p-8 max-h-[90vh] overflow-y-auto outline-none">
            <div class="flex justify-between items-center mb-8">
                <h2 id="modal-title" class="text-xl font-black italic uppercase tracking-wider text-emerald-500">Song
                    Info</h2>
                <button id="delete-btn" onclick="deleteCurrentSong()"
                    class="p-2 text-red-500/50 hover:text-red-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" stroke="currentColor"
                        stroke-width="2" viewBox="0 0 24 24">
                        <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                    </svg>
                </button>
            </div>
            <form id="song-form" class="space-y-6">
                <input type="hidden" id="song-id">
                <div class="space-y-2">
                    <label
                        class="block text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">Title</label>
                    <input type="text" id="input-title" placeholder="Song Name" required
                        class="w-full bg-white/5 rounded-2xl px-6 py-4 font-bold outline-none border border-white/5 focus:border-emerald-500/50 transition-all text-white">
                </div>
                <div class="space-y-2">
                    <label class="block text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">Lyrics &
                        Chords</label>
                    <textarea id="input-lyrics" placeholder="..."
                        class="w-full bg-white/5 rounded-2xl px-6 py-4 h-64 font-mono text-sm outline-none border border-white/5 focus:border-emerald-500/50 transition-all text-white"></textarea>
                </div>
                <div class="space-y-2">
                    <label class="block text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">Setlist
                        Order</label>
                    <input type="number" id="input-order" placeholder="01"
                        class="w-full bg-white/5 rounded-2xl px-6 py-4 font-bold outline-none border border-white/5 focus:border-emerald-500/50 transition-all text-white">
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal()"
                        class="flex-1 py-4 font-bold text-slate-400 hover:text-white transition-colors">Close</button>
                    <button type="submit"
                        class="flex-[2] py-4 bg-emerald-600 text-white rounded-2xl font-black tracking-widest uppercase text-sm shadow-lg shadow-emerald-900/20 active:scale-95 transition-all">Save
                        Changes</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
